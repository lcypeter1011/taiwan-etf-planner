name: 每日 ETF 資料自動更新

on:
  # 每天台灣時間早上 8:00 執行（UTC 00:00）
  schedule:
    - cron: '0 0 * * *'

  # 允許手動在 GitHub 網頁點擊執行（可立即觸發更新）
  workflow_dispatch:

jobs:
  update-etf-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 commit 回 repository
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 提前切換至 Node.js 24（2026/06 強制生效）

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴套件
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml yfinance

      - name: 執行 ETF 資料更新腳本
        run: python update_etf_data.py

      - name: 提交並推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "ETF Auto Updater"
          git add index.html
          # 只有在 index.html 有變更時才 commit
          if git diff --staged --quiet; then
            echo "資料無變化，略過 commit"
          else
            git commit -m "🤖 每日ETF資料更新 $(date -u +%Y-%m-%d)"
            git push
            echo "✅ 已推送更新"
          fi
